name: Thai VIP Lottery Notify

on:
  schedule:
    # รันทุก 15 นาที ตลอด 24 ชั่วโมง
    - cron: "*/15 * * * *"
  workflow_dispatch:   # รันด้วยตนเองได้

permissions:
  contents: write      # ต้องการ permission เพื่อ commit state กลับ repo

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run lottery bot
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python lottery_notify.py

      - name: Commit state if changed
        run: |
          git config user.name  "lottery-bot"
          git config user.email "bot@lottery-notify"
          git add state/ || true
          # commit เฉพาะถ้ามีการเปลี่ยนแปลง
          git diff --staged --quiet || git commit -m "state: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
